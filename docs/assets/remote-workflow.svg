<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">VetQwen remote experiment workflow</title>
  <desc id="desc">Flowchart showing the Mac launcher, remote blackbox machine, remote wrappers, artifact pullback, and demo review loop.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6d7a" />
    </marker>
  </defs>
  <rect width="1200" height="860" fill="#f8fafc" />
  <text x="60" y="72" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183642">Remote Research Workflow</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="74" y="134" width="286" height="150" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="122" y="184" font-size="28" font-weight="700" fill="#183642">Local Mac</text>
    <text x="106" y="222" font-size="18" fill="#46606a">launch wrappers, inspect outputs,</text>
    <text x="106" y="252" font-size="18" fill="#46606a">run Gradio demo, review documents</text>

    <rect x="448" y="100" width="318" height="218" rx="18" fill="#dff1f6" stroke="#6faab8" stroke-width="2" />
    <text x="514" y="150" font-size="28" font-weight="700" fill="#183642">Remote Wrappers</text>
    <text x="482" y="188" font-size="18" fill="#46606a">generate_synthetic_remote.sh</text>
    <text x="482" y="218" font-size="18" fill="#46606a">build_dataset_remote.sh</text>
    <text x="482" y="248" font-size="18" fill="#46606a">checks_remote.sh / train_remote.sh</text>
    <text x="482" y="278" font-size="18" fill="#46606a">evaluate_remote.sh / run_judge_remote.sh</text>

    <rect x="850" y="134" width="286" height="150" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="896" y="184" font-size="28" font-weight="700" fill="#183642">Remote GPU Host</text>
    <text x="886" y="222" font-size="18" fill="#46606a">blackbox + CUDA + Ollama</text>
    <text x="886" y="252" font-size="18" fill="#46606a">uv-managed research environment</text>

    <rect x="154" y="420" width="902" height="132" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="196" y="468" font-size="28" font-weight="700" fill="#183642">Execution Loop</text>
    <text x="196" y="506" font-size="19" fill="#46606a">generate synthetic data -> build dataset -> run checks -> train -> evaluate -> judge -> compare</text>

    <rect x="154" y="620" width="410" height="146" rx="18" fill="#fbead3" stroke="#d0a364" stroke-width="2" />
    <text x="206" y="668" font-size="28" font-weight="700" fill="#183642">Artifact Pullback</text>
    <text x="190" y="706" font-size="18" fill="#46606a">processed data, adapter outputs, metrics,</text>
    <text x="190" y="736" font-size="18" fill="#46606a">comparison markdown, review subsets</text>

    <rect x="636" y="620" width="420" height="146" rx="18" fill="#fbead3" stroke="#d0a364" stroke-width="2" />
    <text x="686" y="668" font-size="28" font-weight="700" fill="#183642">Local Review Loop</text>
    <text x="672" y="706" font-size="18" fill="#46606a">inspect results, update docs, run demo,</text>
    <text x="672" y="736" font-size="18" fill="#46606a">prepare public-facing submission materials</text>

    <line x1="360" y1="208" x2="448" y2="208" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="766" y1="208" x2="850" y2="208" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="608" y1="318" x2="608" y2="420" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="608" y1="552" x2="360" y2="620" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="608" y1="552" x2="846" y2="620" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
  </g>
</svg>
