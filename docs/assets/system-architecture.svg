<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">VetQwen system architecture</title>
  <desc id="desc">Architecture diagram showing the user, Gradio demo, inference core, base model, adapter, datasets, and evaluation artifacts.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6d7a" />
    </marker>
  </defs>
  <rect width="1200" height="760" fill="#f7fafc" />
  <text x="60" y="74" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183642">VetQwen System Architecture</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="72" y="128" width="220" height="94" rx="18" fill="#1f7a8c" />
    <text x="118" y="184" font-size="26" font-weight="700" fill="#ffffff">User / Reviewer</text>

    <rect x="344" y="128" width="254" height="118" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="386" y="174" font-size="26" font-weight="700" fill="#183642">Gradio Demo</text>
    <text x="382" y="208" font-size="18" fill="#46606a">app/gradio_demo.py</text>

    <rect x="664" y="112" width="464" height="154" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="704" y="160" font-size="28" font-weight="700" fill="#183642">Inference Core</text>
    <text x="704" y="198" font-size="19" fill="#46606a">scripts/vetqwen_core/inference.py</text>
    <text x="704" y="230" font-size="19" fill="#46606a">structured prompt + response generation</text>

    <rect x="680" y="324" width="206" height="116" rx="18" fill="#d8f0e8" stroke="#79b69c" stroke-width="2" />
    <text x="715" y="370" font-size="24" font-weight="700" fill="#183642">Base Model</text>
    <text x="715" y="404" font-size="18" fill="#46606a">Qwen2.5-3B-Instruct</text>

    <rect x="922" y="324" width="206" height="116" rx="18" fill="#f9e7d0" stroke="#d4a15d" stroke-width="2" />
    <text x="978" y="370" font-size="24" font-weight="700" fill="#183642">QLoRA Adapter</text>
    <text x="980" y="404" font-size="18" fill="#46606a">./adapter</text>

    <rect x="76" y="326" width="522" height="118" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="114" y="374" font-size="28" font-weight="700" fill="#183642">Dataset and Training Pipeline</text>
    <text x="114" y="408" font-size="18" fill="#46606a">build_dataset.py, train.py, configs/train_default.yaml</text>

    <rect x="76" y="514" width="522" height="150" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="114" y="560" font-size="28" font-weight="700" fill="#183642">Evaluation and Analysis</text>
    <text x="114" y="596" font-size="18" fill="#46606a">evaluate.py, run_judge.py, compare_results.py</text>
    <text x="114" y="628" font-size="18" fill="#46606a">results/*.json and results/comparisons/*.md</text>

    <rect x="680" y="514" width="448" height="150" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="720" y="560" font-size="28" font-weight="700" fill="#183642">Documentation Surface</text>
    <text x="720" y="596" font-size="18" fill="#46606a">README.md</text>
    <text x="720" y="626" font-size="18" fill="#46606a">docs/project-overview.md</text>
    <text x="720" y="656" font-size="18" fill="#46606a">data/dataset_card.md</text>

    <line x1="292" y1="175" x2="344" y2="175" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="598" y1="185" x2="664" y2="185" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="782" y1="266" x2="782" y2="324" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="1026" y1="266" x2="1026" y2="324" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="598" y1="384" x2="680" y2="384" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="598" y1="590" x2="680" y2="590" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="337" y1="444" x2="337" y2="514" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
  </g>
</svg>
