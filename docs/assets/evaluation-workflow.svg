<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">VetQwen evaluation and comparison workflow</title>
  <desc id="desc">Flowchart showing predictions, metric computation, judge scoring, gate checks, and comparison outputs.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6d7a" />
    </marker>
  </defs>
  <rect width="1200" height="820" fill="#f8fafc" />
  <text x="60" y="72" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#183642">Evaluation, Judging, and Comparison</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="76" y="146" width="248" height="118" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="130" y="192" font-size="27" font-weight="700" fill="#183642">Held-out Split</text>
    <text x="116" y="226" font-size="18" fill="#46606a">data/processed/test.jsonl</text>

    <rect x="398" y="146" width="248" height="118" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="442" y="192" font-size="27" font-weight="700" fill="#183642">Model Inference</text>
    <text x="438" y="226" font-size="18" fill="#46606a">baseline or fine-tuned adapter</text>

    <rect x="720" y="146" width="248" height="118" rx="18" fill="#ffffff" stroke="#8fb7c1" stroke-width="2" />
    <text x="764" y="192" font-size="27" font-weight="700" fill="#183642">Predictions</text>
    <text x="758" y="226" font-size="18" fill="#46606a">results/*_predictions.jsonl</text>

    <rect x="218" y="356" width="300" height="146" rx="18" fill="#dff1f6" stroke="#6faab8" stroke-width="2" />
    <text x="266" y="404" font-size="28" font-weight="700" fill="#183642">Primary Metrics</text>
    <text x="252" y="440" font-size="18" fill="#46606a">parse success, format compliance,</text>
    <text x="252" y="470" font-size="18" fill="#46606a">diagnosis hit rate, triage accuracy</text>

    <rect x="590" y="356" width="300" height="146" rx="18" fill="#dff1f6" stroke="#6faab8" stroke-width="2" />
    <text x="652" y="404" font-size="28" font-weight="700" fill="#183642">Judge Scores</text>
    <text x="624" y="440" font-size="18" fill="#46606a">clinical accuracy, completeness,</text>
    <text x="624" y="470" font-size="18" fill="#46606a">tone, hallucination</text>

    <rect x="218" y="582" width="300" height="154" rx="18" fill="#fbead3" stroke="#d0a364" stroke-width="2" />
    <text x="258" y="630" font-size="28" font-weight="700" fill="#183642">Gate Evaluation</text>
    <text x="252" y="666" font-size="18" fill="#46606a">pass/fail thresholds for structure,</text>
    <text x="252" y="696" fill="#46606a" font-size="18">urgent recall, judge regression,</text>
    <text x="252" y="726" fill="#46606a" font-size="18">and source guardrails</text>

    <rect x="590" y="582" width="416" height="154" rx="18" fill="#fbead3" stroke="#d0a364" stroke-width="2" />
    <text x="636" y="630" font-size="28" font-weight="700" fill="#183642">Comparison Outputs</text>
    <text x="624" y="666" font-size="18" fill="#46606a">results/*.json</text>
    <text x="624" y="696" font-size="18" fill="#46606a">results/comparisons/*.md</text>
    <text x="624" y="726" font-size="18" fill="#46606a">public-facing tables and discussion</text>

    <line x1="324" y1="205" x2="398" y2="205" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="646" y1="205" x2="720" y2="205" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="844" y1="264" x2="740" y2="356" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="844" y1="264" x2="368" y2="356" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="368" y1="502" x2="368" y2="582" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="740" y1="502" x2="798" y2="582" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
    <line x1="518" y1="659" x2="590" y2="659" stroke="#4f6d7a" stroke-width="4" marker-end="url(#arrow)" />
  </g>
</svg>
